name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Ensure dataset available (CI fallback)
        run: |
          if [ ! -f "data/raw/cre_deals.csv" ]; then
            mkdir -p data/raw
            python -m src.synth_data || python src/synth_data.py
          fi

      - name: Train model (CI)
        run: |
          mkdir -p models reports
          python -m src.train

      - name: Explainability artifacts (CI)
        run: |
          python -m src.explain

      - name: Run tests
        run: |
          python -m pytest -q

      - name: Docker smoke (build + run + health)
        run: |
          docker build --target with-model -t cre-underwriting-api:ci .
          docker run -d --rm --name cre-underwriting-api-ci -p 18000:8000 cre-underwriting-api:ci
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:18000/health >/dev/null; then
              echo "Docker health OK"
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:18000/health
          docker rm -f cre-underwriting-api-ci
