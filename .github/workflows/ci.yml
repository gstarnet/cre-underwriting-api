name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Generate synthetic dataset (CI)
        run: |
          mkdir -p data/raw
          python -m src.synth_data || python src/synth_data.py

      - name: Train model (CI)
        run: |
          mkdir -p models reports
          python -m src.train

      - name: Explainability artifacts (CI)
        run: |
          python -m src.explain

      - name: Run tests
        run: |
          python -m pytest -q
